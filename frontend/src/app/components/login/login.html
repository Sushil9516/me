<div class="auth-page">
  <div class="auth-card">
    <h1>🔐 Login</h1>
    <p class="subtitle">Sign in to MEAN User Manager</p>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Enter email" [(ngModel)]="email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Enter password" [(ngModel)]="password" />
    </div>

    <button class="btn-primary" (click)="login()">Login</button>

    <p class="link-text">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
