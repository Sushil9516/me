<div class="auth-page">
  <div class="auth-card">
    <h1>📝 Register</h1>
    <p class="subtitle">Create your account</p>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    @if (success) {
      <div class="success-msg">{{ success }}</div>
    }

    <div class="form-group">
      <label>Name</label>
      <input type="text" placeholder="Enter name" [(ngModel)]="name" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Enter email" [(ngModel)]="email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Enter password" [(ngModel)]="password" />
    </div>

    <button class="btn-primary" (click)="register()">Register</button>

    <p class="link-text">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>
